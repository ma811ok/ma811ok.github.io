<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="profilePageTitle">modelhead - My Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/user-portal.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
</head>
<body>
  <div class="container profile-container">
    <header>
      <h1>🧠 My Profile</h1>
      <p class="subtitle">Manage your account and view your sessions</p>
    </header>

    <!-- Profile Card -->
    <div class="card profile-card">
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">?</div>
        <div class="profile-info">
          <h2 id="profileName">Loading...</h2>
          <p class="profile-email" id="profileEmail">-</p>
          <div class="profile-badges">
            <span class="platform-badge" id="profilePlatform">-</span>
            <span class="member-since" id="profileMemberSince">-</span>
          </div>
        </div>
      </div>

      <div class="profile-stats">
        <div class="profile-stat">
          <div class="stat-value" id="profileLoginCount">0</div>
          <div class="stat-label">Logins</div>
        </div>
        <div class="profile-stat">
          <div class="stat-value" id="profileTaskCount">0</div>
          <div class="stat-label">Tasks</div>
        </div>
      </div>
    </div>

    <!-- Edit Profile Card -->
    <div class="card">
      <h2>Edit Profile</h2>
      <form id="profileForm" class="profile-form">
        <div id="profileSuccess" class="success-message" style="display:none">Profile updated successfully!</div>
        <div id="profileError" class="error-message" style="display:none"></div>
        <div class="form-group">
          <label for="editNickname" data-i18n="authNickname">Nickname</label>
          <input type="text" id="editNickname" placeholder="Your display name">
        </div>
        <div class="form-group">
          <label for="editAvatar">Avatar URL</label>
          <input type="text" id="editAvatar" placeholder="https://example.com/avatar.jpg">
        </div>
        <button type="submit" class="btn-primary" id="saveProfileBtn">
          <span class="btn-text">Save Changes</span>
          <span class="spinner" style="display:none"></span>
        </button>
      </form>
    </div>

    <!-- Change Password Card -->
    <div class="card" id="passwordCard">
      <h2>Change Password</h2>
      <form id="passwordForm" class="profile-form">
        <div id="passwordSuccess" class="success-message" style="display:none">Password changed successfully!</div>
        <div id="passwordError" class="error-message" style="display:none"></div>
        <div class="form-group">
          <label for="oldPassword">Current Password</label>
          <input type="password" id="oldPassword" required autocomplete="current-password">
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary" id="changePasswordBtn">
          <span class="btn-text">Change Password</span>
          <span class="spinner" style="display:none"></span>
        </button>
      </form>
    </div>

    <!-- Sessions History Card -->
    <div class="card">
      <h2>My Sessions</h2>
      <div id="sessionsLoading" class="loading-text">Loading sessions...</div>
      <div id="sessionsEmpty" class="empty-text" style="display:none">No sessions yet. Start by uploading a photo!</div>
      <div class="sessions-list" id="sessionsList"></div>
    </div>

    <footer>
      <p><a href="index.html">← Back to Home</a></p>
    </footer>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
