<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="pageTitleViewer">modelhead - 3D Model Viewer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
  <!-- Three.js Modules -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="container viewer-container">
    <header>
      <h1>modelhead</h1>
      <p class="subtitle" data-i18n="subtitleViewer">Upload and inspect 3D model files (STL, OBJ, GLB/GLTF).</p>
    </header>

    <main>
      <!-- Set API endpoint for this page -->
      <script>window.API_ENDPOINT = '/viewer';</script>

      <div class="card upload-card" id="uploadCard">
        <h2 data-i18n="viewerUploadTitle">📁 Upload Model</h2>
        <p class="views-hint" data-i18n="viewerUploadHint">Upload a 3D model file (STL, OBJ, GLB/GLTF). You can also drag and drop.</p>

        <div class="single-view">
          <div class="view-card">
            <div class="view-upload">
              <div class="view-dropzone" id="dropZone">
                <div class="view-dropzone-content" id="dropContent">
                  <div class="view-icon">📂</div>
                  <p class="drop-text" data-i18n="dropText">Click or drag a 3D model file</p>
                </div>
                <div class="view-preview" id="preview" style="display:none">
                  <p id="fileName">model.stl</p>
                  <button class="view-change-btn" id="changeFileBtn" data-i18n-value="change">Change</button>
                </div>
              </div>
              <input type="file" class="view-file-input" id="fileInput" accept=".stl,.obj,.glb,.gltf" hidden>
            </div>
          </div>
        </div>
      </div>

      <div class="card viewer-card" id="viewerCard" style="display:none">
        <div class="viewer-toolbar">
          <div class="toolbar-left">
            <span id="modelName">-</span>
          </div>
          <div class="toolbar-right">
            <button id="btnWireframe" data-i18n-title="toggleWireframe" title="Wireframe">🔲</button>
            <button id="btnResetCamera" data-i18n-title="resetCamera" title="Reset Camera">🔄</button>
          </div>
        </div>
        <div id="viewerContainer"></div>
      </div>

      <div class="card error-card" id="errorCard" style="display:none">
        <h2 data-i18n="error">❌ Error</h2>
        <p id="errorMessage"></p>
      </div>
    </main>

    <footer>
      <p data-i18n="footerViewer">Powered by <strong>Three.js</strong> — modelhead v1.2</p>
    </footer>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script type="module" src="js/viewer.js"></script>
</body>
</html>
